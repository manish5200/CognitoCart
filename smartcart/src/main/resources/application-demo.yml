# ==============================================================
# CognitoCart — DEMO Configuration (Safe to commit to Git)
# ==============================================================
# This file contains FAKE placeholder values for reference only.
# For local development:
#   1. Copy application-dev.yml.example → application-dev.yml
#   2. Fill in your real DB / mail / JWT values
# The real application.yml and application-dev.yml are gitIgnored.
# ==============================================================

spring:
  # ================================
  # OAUTH 2.0 CONFIGURATION
  # ================================
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:placeholder_id}
            client-secret: ${GOOGLE_CLIENT_SECRET:placeholder_secret}
            scope: email, profile

  profiles:
    active: dev

  flyway:
    enabled: true
    baseline-on-migrate: true
    validate-on-migrate: true
    locations: classpath:db/migration

  datasource:
    url: jdbc:postgresql://localhost:5432/cognitocart
    username: your_db_username
    password: your_db_password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      # Flyway manages all schema changes — Hibernate only validates
      ddl-auto: validate
    open-in-view: false
    show-sql: false

  # ================================
  # REDIS CACHE (Upstash)
  # Sign up free at https://upstash.com → create DB → copy URL
  # Format: rediss://default:PASSWORD@HOST.upstash.io:6379
  # "rediss" (double s) = TLS, required by Upstash
  # ================================
  data:
    redis:
      url: rediss://default:YOUR_UPSTASH_PASSWORD@YOUR_UPSTASH_HOST.upstash.io:6379
      ssl:
        enabled: true

  cache:
    type: redis
    redis:
      key-prefix: "cognitocart::"
      use-key-prefix: true
      cache-null-values: false


  mail:
    host: smtp.gmail.com
    port: 587
    username: your_gmail_address@gmail.com
    # Use a Gmail App Password — NOT your real Gmail password
    # Generate here: https://myaccount.google.com/apppasswords
    password: your_gmail_app_password
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

server:
  port: 8080

# ================================
# JWT CONFIGURATION
# ================================
application:
  security:
    jwt:
      # Generate a secure key: openssl rand -base64 32
      secret-key: your_256bit_base64_jwt_secret_here
      # Access token lifetime: 15 minutes = 900000 ms
      expiration: 900000
      refresh-token:
        # Refresh token lifetime: 1 hour = 3600000 ms
        expiration: 3600000

# ================================
# ADMIN SEED — auto-created on first startup
# ================================
admin:
  email: admin@cognitocart.com
  password: ChangeMe@123
  name: CognitoCart Admin
  phone: +910000000000

# ================================
# FILE STORAGE
# ================================
app:
  upload-dir: uploads/products/

# ================================
# LOGGING LEVEL CONFIGURATION
# ================================
logging:
  level:
    com:
      manish:
        smartcart: DEBUG

# ================================
# SWAGGER / API DOCUMENTATION
# ================================
springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
# ================================
# RAZORPAY CONFIGURATION
# Set these as environment variables in your run configuration
# ================================
razorpay:
  key-id: ${RAZORPAY_KEY_ID:rzp_test_placeholder}
  key-secret: ${RAZORPAY_KEY_SECRET:placeholder_secret}
  webhook-secret: ${RAZORPAY_WEBHOOK_SECRET:my_secure_webhook_secret_123}

# ─── Cloudinary Configuration ───────────────────────────────────────────────
# Sign up free at https://cloudinary.com/ → Dashboard shows cloud-name, key, secret
# Images are stored on Cloudinary's CDN and served via https://res.cloudinary.com/...
cloudinary:
  cloud-name: your-cloud-name
  api-key: your-api-key
  api-secret: your-api-secret

# ─── HuggingFace AI Configuration (Phase 4 — Semantic Search) ───────────────
# Used for: Generating 384-dimensional text embeddings for products and search queries.
# Model: sentence-transformers/all-MiniLM-L6-v2 — free, fast, excellent for semantic similarity.
#
# Setup (takes 60 seconds, completely free):
#   1. Create account at https://huggingface.co/
#   2. Go to https://huggingface.co/settings/tokens
#   3. Click "New token" → copy the token (starts with hf_...)
#   4. Paste it below
#
# Free tier: 1,000 requests/day — more than enough for development and testing.
# The pgvector extension must also be installed on your PostgreSQL instance.
huggingface:
  api-key: hf_your_token_here
  model: sentence-transformers/all-MiniLM-L6-v2

# ─── RabbitMQ Configuration (Event-Driven Architecture) ─────────────────────
# Used for: Async PDF invoice generation + email dispatch off the HTTP thread.
# This drops payment API response from ~4.5s → <50ms.
#
# Setup (free CloudAMQP account):
#   1. Sign up at https://www.cloudamqp.com/ → create a "Little Lemur" (free) instance
#   2. Go to your instance → Details tab
#   3. Copy: Host, Username, Password, Virtual Host
#   4. Port 5671 = secure AMQPS (required by CloudAMQP free tier)
#
# Dead Letter Queue (DLQ):
#   - queue.order.paid        → main queue (processes payment events)
#   - queue.order.paid.dlq    → fallback queue (catches failed events after 3 retries)
#   Both queues are auto-created by RabbitMQConfig.java on first startup.
spring:
  rabbitmq:
    host: your-instance.rmq.cloudamqp.com
    port: 5671
    username: your_cloudamqp_username
    password: your_cloudamqp_password
    virtual-host: your_cloudamqp_vhost
    ssl:
      enabled: true   # Required for CloudAMQP AMQPS connections

# ================================
# OBSERVABILITY — Actuator + Prometheus + Grafana Cloud
# ================================
# Used for: Live production monitoring — JVM heap, GC cycles, DB pool,
# RabbitMQ throughput, HTTP latency, custom business counters.
#
# Setup:
#   1. No extra signup needed — /actuator/prometheus is auto-exposed
#   2. For Grafana Cloud: sign up free at https://grafana.com/
#   3. Install Grafana Alloy (local agent) — scrapes localhost:8080/actuator/prometheus
#      and pushes metrics to Grafana Cloud every 15 seconds
#   4. Import dashboard ID 19004 for instant Spring Boot monitoring panels
management:
  endpoints:
    web:
      exposure:
        # Exposed endpoints:
        # prometheus → scraped by Grafana Alloy → pushed to Grafana Cloud
        # health     → /actuator/health shows db/redis/rabbit status
        # metrics    → raw metric browser for debugging
        include: health, metrics, prometheus, info
  endpoint:
    health:
      # Returns full component details: { db: UP, redis: UP, rabbit: UP }
      show-details: always
    prometheus:
      enabled: true
  metrics:
    tags:
      # Tags all metrics with app name for Grafana dashboard filtering
      application: cognitocart
    export:
      prometheus:
        enabled: true
